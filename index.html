<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bánh Tráng Trộn Của Bé</title>
  <!-- Nhúng Tailwind CSS qua CDN để chạy trực tiếp trên GitHub Pages không cần build -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS-only State Logic dùng Radio Buttons */
    #state-start:checked ~ .view-start {
      display: flex;
    }
    #state-start:not(:checked) ~ .view-start {
      display: none;
    }

    #state-eaten:checked ~ .view-result,
    #state-forgiven:checked ~ .view-result {
      display: flex;
    }
    #state-start:checked ~ .view-result {
      display: none;
    }

    /* Hiển thị nút "Hết giận" hay thông báo "Yêu em" dựa trên state */
    #state-eaten:checked ~ .view-result .btn-forgive {
      display: flex;
    }
    #state-eaten:not(:checked) ~ .view-result .btn-forgive {
      display: none;
    }

    #state-forgiven:checked ~ .view-result .msg-forgiven {
      display: flex;
    }
    #state-forgiven:not(:checked) ~ .view-result .msg-forgiven {
      display: none;
    }

    /* Thanh thông báo nổi ở dưới */
    #state-start:checked ~ .view-floating {
      display: none;
    }
    #state-eaten:checked ~ .view-floating,
    #state-forgiven:checked ~ .view-floating {
      display: flex;
    }

    /* Animations (Keyframes) */
    @keyframes pulse-heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .animate-pulse-heart {
      animation: pulse-heart 1.5s infinite;
    }
    
    @keyframes bounce-custom {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-25%); }
    }
    .animate-bounce-custom {
      animation: bounce-custom 1.5s infinite;
    }
    
    .view-transition {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="min-h-screen bg-[#FFF0F5] relative flex flex-col items-center justify-center p-8 font-sans overflow-hidden m-0">
  
  <!-- Các Radio Buttons ẩn dùng để quản lý state (trạng thái) của app -->
  <input type="radio" name="app-state" id="state-start" class="hidden" checked />
  <input type="radio" name="app-state" id="state-eaten" class="hidden" />
  <input type="radio" name="app-state" id="state-forgiven" class="hidden" />

  <!-- Background Decorative Elements -->
  <div class="absolute top-10 left-10 w-32 h-32 bg-[#FFD1DC] rounded-full opacity-50"></div>
  <div class="absolute bottom-20 right-10 w-48 h-48 bg-[#FFB7C5] rounded-full opacity-30"></div>
  <div class="absolute top-1/2 -left-20 w-40 h-40 bg-[#FADADD] rounded-full opacity-40"></div>

  <!-- Start View: Màn hình ban đầu -->
  <div class="view-start relative z-10 flex flex-col items-center gap-6 view-transition w-full max-w-4xl justify-center">
    <!-- Dùng thẻ label trỏ tới radio button state-eaten để đổi state khi click -->
    <label for="state-eaten" class="w-full sm:w-auto bg-[#FF477E] hover:bg-[#FF1A5E] text-white text-3xl font-black px-12 py-8 rounded-[35px] shadow-[0_12px_0px_#B91C1C] border-b-4 border-[#991B1B] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-4 cursor-pointer group select-none">
      <span class="text-3xl animate-pulse-heart">🤍</span>
      HÃY ĂN TÔI ĐI 🥺
      <span class="text-3xl animate-pulse-heart">🤍</span>
    </label>
    <p class="text-[#FF85A1] font-bold text-xl animate-bounce-custom">
      Nhấn vào đây nè! ↓
    </p>
  </div>

  <!-- Result View: Màn hình bánh tráng trộn -->
  <div class="view-result relative w-full max-w-[640px] bg-white rounded-[60px] shadow-[0_35px_60px_-15px_rgba(255,105,180,0.3)] border-[8px] border-[#FF85A1] p-12 flex flex-col items-center text-center space-y-8 z-10 view-transition">
    <!-- Decorative Hearts -->
    <div class="absolute -top-10 -right-10 text-6xl transform rotate-12 select-none">🥰</div>
    <div class="absolute -bottom-10 -left-10 text-6xl transform -rotate-12 select-none">🎀</div>

    <!-- Food Photo Section -->
    <div class="w-56 h-56 rounded-[40px] flex items-center justify-center border-4 border-[#FFB7C5] shadow-[0_10px_20px_rgba(255,105,180,0.2)] overflow-hidden relative bg-[#FFF0F3]">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Mixed_rice_paper.jpg" alt="Bánh tráng trộn" class="w-full h-full object-cover" />
    </div>

    <!-- Message Section -->
    <div class="space-y-4">
      <h1 class="text-5xl font-black text-[#FF477E] tracking-tight">
        Bánh Tráng Trộn Đây! 🎉
      </h1>
      <p class="text-2xl font-medium text-[#FF85A1] italic">
        "Ăn xong bớt giận nha... nhaaa!" ✨
      </p>
    </div>

    <!-- Cute Detail List -->
    <div class="flex flex-wrap justify-center gap-3">
      <span class="px-4 py-2 bg-[#FFEBEE] text-[#FF477E] rounded-full text-sm font-bold border border-[#FFCCD5]">🌶️ Siêu Cay</span>
      <span class="px-4 py-2 bg-[#F3E5F5] text-[#AB47BC] rounded-full text-sm font-bold border border-[#E1BEE7]">🥚 Trứng Cút</span>
      <span class="px-4 py-2 bg-[#E8F5E9] text-[#43A047] rounded-full text-sm font-bold border border-[#C8E6C9]">🥭 Xoài Chua</span>
    </div>

    <div class="flex flex-col items-center gap-4 mt-4 w-full">
      
      <!-- Nút Forgive (Hết giận) -->
      <div class="btn-forgive w-full flex justify-center view-transition">
        <!-- Trỏ tới state-forgiven -->
        <label for="state-forgiven" class="w-full sm:w-auto bg-[#FF477E] hover:bg-[#FF1A5E] text-white text-xl font-bold px-8 py-4 rounded-full shadow-[0_6px_0px_#B91C1C] border-b-4 border-[#991B1B] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-3 cursor-pointer select-none">
          <span class="text-xl animate-pulse-heart">🤍</span>
          Hết giận anh nha em bé 🥺
        </label>
      </div>

      <!-- Tin nhắn Forgiven (Yêu em nhất trên đời) -->
      <div class="msg-forgiven w-full flex justify-center view-transition">
        <div class="text-2xl font-black text-[#FF477E] flex items-center gap-2 bg-[#FFF0F3] px-6 py-3 rounded-full">
          Yêu em nhất trên đời! 🥰💖
        </div>
      </div>

      <!-- Nút Quay lại -->
      <!-- Trỏ về state-start để reset lại từ đầu -->
      <label for="state-start" class="px-6 py-3 bg-[#FFF0F3] text-[#FF85A1] hover:text-[#FF477E] hover:bg-[#FFD1DC] rounded-full font-bold transition-colors cursor-pointer select-none mt-2">
        Quay lại
      </label>
    </div>
  </div>

  <!-- Floating Feedback/Mood Section -->
  <div class="view-floating absolute bottom-8 w-full max-w-2xl justify-between items-center bg-white/60 backdrop-blur-md rounded-full px-8 py-4 border-2 border-white shadow-sm z-20 hidden md:flex view-transition">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-[#FF85A1] rounded-full flex items-center justify-center text-white font-bold text-xl">✓</div>
      <span class="text-[#FF477E] font-bold">Đã chuẩn bị xong bánh tráng trộn siêu ngon</span>
    </div>
    <div class="flex -space-x-3">
      <div class="w-8 h-8 rounded-full border-2 border-white bg-pink-200 flex items-center justify-center text-[10px]">🍓</div>
      <div class="w-8 h-8 rounded-full border-2 border-white bg-pink-300 flex items-center justify-center text-[10px]">🍭</div>
      <div class="w-8 h-8 rounded-full border-2 border-white bg-pink-400 flex items-center justify-center text-[10px]">🌸</div>
    </div>
  </div>

</body>
</html>
